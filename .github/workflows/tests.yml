name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - name: Unit tests + coverage
        working-directory: android-widget
        run: ./gradlew :app:createDebugUnitTestCoverageReport --no-daemon
      - name: Upload unit coverage
        uses: coverallsapp/github-action@v2
        with:
          file: android-widget/app/build/reports/coverage/test/debug/report.xml
          format: jacoco
          base-path: android-widget/app/src/main/java
          flag-name: unit
          parallel: true

  instrumented:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Instrumented UI tests + coverage
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          working-directory: android-widget
          script: ./gradlew :app:createDebugAndroidTestCoverageReport --no-daemon
      - name: Locate Android-test coverage report
        run: echo "COV=$(find android-widget/app/build/reports/coverage/androidTest -name report.xml | head -1)" >> "$GITHUB_ENV"
      - name: Upload UI coverage
        uses: coverallsapp/github-action@v2
        with:
          file: ${{ env.COV }}
          format: jacoco
          base-path: android-widget/app/src/main/java
          flag-name: ui
          parallel: true

  finish:
    needs: [unit, instrumented]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Tell Coveralls coverage is complete
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
