name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Run unit tests + coverage
        working-directory: android-widget
        run: ./gradlew :app:createDebugUnitTestCoverageReport --no-daemon

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: android-widget/app/build/reports/coverage/test/debug/report.xml
          format: jacoco
          base-path: android-widget/app/src/main/java
